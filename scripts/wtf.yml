# SignalForge — WTF terminal dashboard
#
# Install:  brew install wtfutil

wtf:
  colors:
    background: black
    border:
      focusable: green
      focused: gold
      normal: gray
  grid:
    columns: [47, 47, 47, 47]
    rows: [12,6,6,6,6]
  refreshInterval: 60

  mods:



    banner:
      type: cmdrunner
      title: "  SignalForge — Always Be Scraping"
      cmd: "bash"
      focusable: false
      args: ["/Users/chris/PycharmProjects/devpost_scraper/scripts/wtf-panel.sh", "banner"]
      enabled: true
      color:
        text: "green"
      position:
        top: 0
        left: 0
        height: 1
        width: 4
      refreshInterval: 30s

