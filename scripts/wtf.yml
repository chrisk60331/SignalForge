# SignalForge — WTF terminal dashboard
#
# Install:  brew install wtfutil

wtf:
  colors:
    background: black
    border:
      focusable: green
      focused: gold
      normal: gray
  grid:
    columns: [47, 47, 47, 47]
    rows: [12,9,9,9]
  refreshInterval: 60

  mods:

    runs:
      type: cmdrunner
      title: "  Runs"
      cmd: "bash"
      args: ["/Users/chris/PycharmProjects/devpost_scraper/scripts/wtf-panel.sh", "runs"]
      enabled: true
      position:
        top: 0
        left: 0
        height: 1
        width: 1
      refreshInterval: 30s

    banner:
      type: cmdrunner
      title: "  SignalForge — WTF terminal dashboard"
      cmd: "bash"
      args: ["/Users/chris/PycharmProjects/devpost_scraper/scripts/wtf-panel.sh", "banner"]
